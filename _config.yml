theme: jekyll-theme-chirpy

lang: ko-KR
timezone: Asia/Seoul

title: Hwasowl
tagline: 백엔드 개발자의 기술 노트
description: >-
  Java, Spring Boot 백엔드 개발 블로그. 트러블슈팅, 기술 결정, 회고를 기록합니다.

url: "https://hwasowl.github.io"
baseurl: ""

github:
  username: Hwasowl

social:
  name: Hwasowl
  email: hwasowl598@gmail.com
  links:
    - https://github.com/Hwasowl

theme_mode:

avatar:

toc: true

comments:
  provider: giscus
  giscus:
    repo: Hwasowl/Hwasowl.github.io
    repo_id:
    category: Announcements
    category_id:
    mapping: pathname
    strict: 0
    input_position: bottom
    lang: ko
    reactions_enabled: 1

paginate: 10

kramdown:
  footnote_backlink: "&#8617;&#xfe0e;"
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: highlight
    block:
      line_numbers: true
      start_line: 1

collections:
  tabs:
    output: true
    sort_by: order

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      comments: true
      toc: true
      permalink: /posts/:title/
  - scope:
      path: _drafts
    values:
      comments: false
  - scope:
      path: ""
      type: tabs
    values:
      layout: page
      permalink: /:title/

sass:
  style: compressed

compress_html:
  clippings: all
  comments: all
  endings: all
  profile: false
  blanklines: false
  ignore:
    envs: [development]

exclude:
  - "*.gem"
  - "*.gemspec"
  - docs
  - tools
  - README.md
  - LICENSE
  - "*.config.js"
  - package-lock.json

jekyll-archives:
  enabled: [categories, tags]
  layouts:
    category: category
    tag: tag
  permalinks:
    tag: /tags/:name/
    category: /categories/:name/
